services:
  app:
    build: .
    ports:
      - "8080:8080"
    command: ["-storage=postgres", "-dsn=postgres://user:password@db:5432/shortener?sslmode=disable"]
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: shortener
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d shortener"]
      interval: 5s
      timeout: 5s
      retries: 5